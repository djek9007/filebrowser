version: "3"

services:
  filebrowser:
    image: hurlenko/filebrowser
    container_name: filebrowser
    user: "${UID}:${GID}"
    ports:
      - "${PORT}:8080"
    volumes:
      - "./data:/data"
      - "./config:/config"
    environment:
      FB_BASEURL: "/filebrowser"
      VIRTUAL_HOST: ${SSL_DOMAIN}
      VIRTUAL_PORT: ${PORT}
      LETSENCRYPT_HOST: ${SSL_DOMAIN}
    restart: always
    networks:
      - https

networks:
  https:
    external:
      name: ${HTTPS_NETWORK}
